name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # CI-only placeholders — real secrets belong in GitHub Environments / repository secrets.
  DATABASE_URL: postgresql://ci:ci@localhost:5432/cardverse
  DIRECT_URL: postgresql://ci:ci@localhost:5432/cardverse
  REDIS_URL: redis://localhost:6379
  API_URL: http://localhost:4000
  WEB_URL: http://localhost:3000
  CORS_ORIGIN: http://localhost:3000
  NEXT_PUBLIC_API_URL: http://localhost:3000/backend
  NEXT_PUBLIC_WS_URL: http://localhost:3000
  INTERNAL_API_SECRET: ci-internal-secret
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: API unit tests
        run: pnpm --filter @cardverse/api test

  docker:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        service: [api, worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: false
          tags: cardverse-${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
