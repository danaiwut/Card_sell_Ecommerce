# Local infrastructure for CardVerse development.
# Run: docker compose up -d   (then: pnpm db:bootstrap && pnpm dev)
# App UI: http://localhost:3000
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cardverse_redis:/data

volumes:
  cardverse_redis:
